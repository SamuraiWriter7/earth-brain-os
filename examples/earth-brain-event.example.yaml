{
"$schema": "https://json-schema.org/draft/2020-12/schema",
"$id": "https://samuraiwriter7.github.io/earth-brain-os/schemas/layers/human-governance-layer.schema.json",
"title": "Human Governance Layer",
"description": "Schema for the Human Governance Layer in Earth Brain OS v0.2 Modular Event Architecture. This layer defines human oversight, governance authority, review processes, accountability, consent, appeal, public-interest safeguards, escalation handling, trace requirements, and governance hooks.",
"type": "object",
"additionalProperties": false,
"required": [
"layer_id",
"layer_name",
"layer_type",
"layer_version",
"status",
"governance_scope",
"governance_bodies",
"decision_records",
"review_model",
"accountability_model",
"consent_model",
"appeal_model",
"input_events",
"output_events",
"trace_requirements",
"governance_hooks"
],
"properties": {
"layer_id": {
"type": "string",
"description": "Stable identifier for this layer instance.",
"pattern": "^layer:[a-z0-9][a-z0-9.*:-]*$",
"examples": [
"layer:human-governance"
]
},
"layer_name": {
"type": "string",
"const": "Human Governance Layer",
"description": "Human-readable name of the layer."
},
"layer_type": {
"type": "string",
"const": "human_governance_layer",
"description": "Machine-readable layer type."
},
"layer_version": {
"type": "string",
"description": "Version of this layer schema or implementation profile.",
"pattern": "^v?\\d+\\.\\d+\\.\\d+(-[a-zA-Z0-9.-]+)?$",
"examples": [
"v0.2.0-candidate"
]
},
"status": {
"type": "string",
"description": "Operational status of the layer.",
"enum": [
"draft",
"experimental",
"active",
"deprecated",
"retired"
]
},
"description": {
"type": "string",
"description": "Short explanation of this Human Governance Layer configuration."
},
"governance_scope": {
"$ref": "#/$defs/governance_scope"
},
"governance_bodies": {
"type": "array",
"description": "Human governance bodies, reviewers, operators, councils, boards, or public-interest authorities connected to this layer.",
"minItems": 1,
"items": {
"$ref": "#/$defs/governance_body"
}
},
"decision_records": {
"type": "array",
"description": "Governance decisions, approvals, vetoes, appeals, or review outcomes managed by this layer.",
"minItems": 1,
"items": {
"$ref": "#/$defs/decision_record"
}
},
"review_model": {
"$ref": "#/$defs/review_model"
},
"accountability_model": {
"$ref": "#/$defs/accountability_model"
},
"consent_model": {
"$ref": "#/$defs/consent_model"
},
"appeal_model": {
"$ref": "#/$defs/appeal_model"
},
"public_interest_controls": {
"$ref": "#/$defs/public_interest_controls"
},
"input_events": {
"type": "array",
"description": "Events or signals accepted by this layer.",
"items": {
"$ref": "#/$defs/event_port"
},
"default": []
},
"output_events": {
"type": "array",
"description": "Events or signals emitted by this layer.",
"items": {
"$ref": "#/$defs/event_port"
},
"default": []
},
"linked_layers": {
"type": "array",
"description": "Other Earth Brain OS layers directly connected to this layer.",
"items": {
"$ref": "#/$defs/layer_reference"
},
"default": []
},
"trace_requirements": {
"$ref": "#/$defs/trace_requirements"
},
"governance_hooks": {
"$ref": "#/$defs/governance_hooks"
},
"extension_fields": {
"type": "object",
"description": "Reserved space for implementation-specific extensions.",
"additionalProperties": true,
"default": {}
}
},
"$defs": {
"governance_scope": {
"type": "object",
"additionalProperties": false,
"required": [
"governance_domains",
"governance_mode",
"authority_level",
"accountability_priority",
"human_review_required"
],
"properties": {
"governance_domains": {
"type": "array",
"description": "Domains where human governance is applied.",
"minItems": 1,
"items": {
"type": "string",
"enum": [
"agent_oversight",
"tool_use_approval",
"knowledge_integrity",
"trace_dispute",
"attribution_dispute",
"royalty_dispute",
"kazene_regulation_review",
"defense_escalation",
"lifecycle_decision",
"policy_authoring",
"public_interest_review",
"human_rights_safeguard",
"system_shutdown",
"other"
]
}
},
"governance_mode": {
"type": "string",
"description": "Primary mode of human governance used by this layer.",
"enum": [
"human_in_the_loop",
"human_on_the_loop",
"deliberative_review",
"representative_governance",
"public_interest_board",
"defense_court",
"community_review",
"hybrid",
"other"
]
},
"authority_level": {
"type": "string",
"description": "Maximum authority level granted to this governance layer.",
"enum": [
"advisory",
"binding_review",
"approval_required",
"veto_authority",
"emergency_authority",
"constitutional_authority"
]
},
"accountability_priority": {
"type": "string",
"description": "Primary accountability priority for governance decisions.",
"enum": [
"individual_rights",
"human_safety",
"public_interest",
"system_integrity",
"trace_integrity",
"fair_value_circulation",
"civilizational_resilience",
"other"
]
},
"human_review_required": {
"type": "boolean",
"description": "Whether human review is required for governance-relevant events."
},
"boundary_conditions": {
"type": "array",
"description": "Boundary conditions limiting human governance authority, intervention, disclosure, or delegation.",
"items": {
"type": "string"
},
"default": []
}
}
},
"governance_body": {
"type": "object",
"additionalProperties": false,
"required": [
"body_id",
"body_type",
"body_name",
"authority_scope",
"decision_rights",
"accountability_status"
],
"properties": {
"body_id": {
"type": "string",
"description": "Stable identifier for the governance body.",
"pattern": "^governance-body:[a-z0-9][a-z0-9.*:-]*$",
"examples": [
"governance-body:human-review-board"
]
},
"body_type": {
"type": "string",
"description": "Type of human governance body.",
"enum": [
"human_operator",
"review_board",
"ethics_board",
"defense_court",
"public_interest_council",
"technical_maintainer",
"community_representative",
"rights_reviewer",
"emergency_authority",
"other"
]
},
"body_name": {
"type": "string",
"description": "Human-readable name of the governance body."
},
"authority_scope": {
"type": "array",
"description": "Areas where this body has authority.",
"minItems": 1,
"items": {
"type": "string",
"enum": [
"observe",
"review",
"approve",
"reject",
"veto",
"pause",
"rollback",
"escalate",
"amend_policy",
"trigger_emergency_stop",
"other"
]
}
},
"decision_rights": {
"type": "string",
"description": "Decision authority granted to this governance body.",
"enum": [
"observe_only",
"recommend",
"approve_or_reject",
"binding_decision",
"veto",
"emergency_override"
]
},
"accountability_status": {
"type": "string",
"description": "Accountability status of this governance body.",
"enum": [
"identified",
"delegated",
"representative",
"audited",
"publicly_accountable",
"unknown"
]
},
"contact_or_registry_ref": {
"type": "string",
"description": "Optional reference to a contact point, registry, policy document, or governance record."
},
"conflict_of_interest_policy": {
"type": "string",
"description": "Policy for handling conflicts of interest."
}
}
},
"decision_record": {
"type": "object",
"additionalProperties": false,
"required": [
"decision_id",
"decision_type",
"decision_status",
"subject_ref",
"authority_ref",
"rationale"
],
"properties": {
"decision_id": {
"type": "string",
"description": "Stable identifier for the governance decision.",
"pattern": "^governance-decision:[a-z0-9][a-z0-9._:-]*$",
"examples": [
"governance-decision:approve-agent-action-001"
]
},
"decision_type": {
"type": "string",
"description": "Type of governance decision.",
"enum": [
"approval",
"rejection",
"veto",
"pause",
"rollback",
"policy_update",
"appeal_result",
"dispute_resolution",
"emergency_action",
"public_interest_review",
"other"
]
},
"decision_status": {
"type": "string",
"description": "Current status of this decision.",
"enum": [
"draft",
"pending_review",
"approved",
"rejected",
"vetoed",
"appealed",
"superseded",
"retired"
]
},
"subject_ref": {
"type": "string",
"description": "Reference to the event, agent action, trace record, attribution claim, royalty route, defense signal, or policy under review."
},
"authority_ref": {
"type": "string",
"description": "Governance body responsible for the decision.",
"pattern": "^governance-body:[a-z0-9][a-z0-9.*:-]*$"
},
"rationale": {
"type": "string",
"description": "Human-readable rationale for the decision."
},
"linked_trace_ids": {
"type": "array",
"description": "Trace identifiers linked to this governance decision.",
"items": {
"type": "string"
},
"default": []
},
"effective_time": {
"type": "string",
"description": "Optional time when the decision becomes effective.",
"format": "date-time"
}
}
},
"review_model": {
"type": "object",
"additionalProperties": false,
"required": [
"review_method",
"review_trigger_policy",
"review_timing",
"review_outcome_policy"
],
"properties": {
"review_method": {
"type": "string",
"description": "Primary review method used by this layer.",
"enum": [
"single_reviewer",
"multi_reviewer",
"board_review",
"defense_court_review",
"public_interest_review",
"community_review",
"expert_review",
"hybrid",
"other"
]
},
"review_trigger_policy": {
"type": "string",
"description": "Policy defining when human review is triggered."
},
"review_timing": {
"type": "string",
"description": "When review occurs relative to system action.",
"enum": [
"before_action",
"after_action",
"continuous",
"periodic",
"on_dispute",
"on_escalation",
"manual"
]
},
"review_outcome_policy": {
"type": "string",
"description": "How review outcomes are applied to events, agents, policies, or routes."
},
"minimum_reviewers": {
"type": "integer",
"description": "Minimum number of reviewers required.",
"minimum": 0
},
"review_time_limit": {
"type": "string",
"description": "Optional human-readable time limit for review."
}
}
},
"accountability_model": {
"type": "object",
"additionalProperties": false,
"required": [
"responsibility_assignment",
"auditability_required",
"explanation_required",
"liability_boundary_policy"
],
"properties": {
"responsibility_assignment": {
"type": "string",
"description": "How responsibility is assigned among humans, agents, institutions, and governance bodies."
},
"auditability_required": {
"type": "boolean",
"description": "Whether governance decisions must be auditable."
},
"explanation_required": {
"type": "boolean",
"description": "Whether decisions must include human-readable explanations."
},
"liability_boundary_policy": {
"type": "string",
"description": "Policy for defining accountability and liability boundaries."
},
"accountability_records": {
"type": "array",
"description": "Optional accountability records or references.",
"items": {
"$ref": "#/$defs/accountability_record"
},
"default": []
}
}
},
"accountability_record": {
"type": "object",
"additionalProperties": false,
"required": [
"record_id",
"responsible_party_ref",
"responsibility_type",
"scope"
],
"properties": {
"record_id": {
"type": "string",
"description": "Stable identifier for the accountability record.",
"pattern": "^accountability-record:[a-z0-9][a-z0-9.*:-]*$"
},
"responsible_party_ref": {
"type": "string",
"description": "Reference to the responsible human, body, institution, or role."
},
"responsibility_type": {
"type": "string",
"description": "Type of responsibility assigned.",
"enum": [
"operator_responsibility",
"review_responsibility",
"policy_responsibility",
"technical_responsibility",
"public_interest_responsibility",
"appeal_responsibility",
"emergency_responsibility",
"other"
]
},
"scope": {
"type": "string",
"description": "Scope of the responsibility."
},
"review_cycle": {
"type": "string",
"description": "Optional review cycle for this accountability record."
}
}
},
"consent_model": {
"type": "object",
"additionalProperties": false,
"required": [
"consent_required",
"consent_scope_policy",
"withdrawal_policy",
"consent_record_policy"
],
"properties": {
"consent_required": {
"type": "boolean",
"description": "Whether consent is required for relevant human data, contribution, attribution, or participation."
},
"consent_scope_policy": {
"type": "string",
"description": "Policy defining the scope of consent."
},
"withdrawal_policy": {
"type": "string",
"description": "Policy for withdrawing consent."
},
"consent_record_policy": {
"type": "string",
"description": "Policy for recording, updating, and auditing consent."
},
"consent_status_values": {
"type": "array",
"description": "Allowed consent status values used by this layer.",
"items": {
"type": "string",
"enum": [
"unknown",
"not_required",
"requested",
"granted",
"limited",
"withdrawn",
"expired",
"disputed"
]
},
"default": [
"unknown",
"not_required",
"requested",
"granted",
"limited",
"withdrawn",
"expired",
"disputed"
]
}
}
},
"appeal_model": {
"type": "object",
"additionalProperties": false,
"required": [
"appeal_allowed",
"appeal_trigger_policy",
"appeal_review_body",
"appeal_resolution_policy"
],
"properties": {
"appeal_allowed": {
"type": "boolean",
"description": "Whether affected parties may appeal governance decisions."
},
"appeal_trigger_policy": {
"type": "string",
"description": "Policy defining when an appeal may be filed."
},
"appeal_review_body": {
"type": "string",
"description": "Governance body responsible for appeals.",
"pattern": "^governance-body:[a-z0-9][a-z0-9._:-]*$"
},
"appeal_resolution_policy": {
"type": "string",
"description": "Policy for resolving appeals."
},
"appeal_time_limit": {
"type": "string",
"description": "Optional human-readable time limit for appeals."
}
}
},
"public_interest_controls": {
"type": "object",
"additionalProperties": false,
"properties": {
"public_interest_review_required": {
"type": "boolean",
"description": "Whether public-interest review is required for high-impact decisions."
},
"rights_impact_assessment_required": {
"type": "boolean",
"description": "Whether rights impact assessment is required."
},
"transparency_report_required": {
"type": "boolean",
"description": "Whether transparency reporting is required."
},
"anti_capture_policy": {
"type": "string",
"description": "Policy for preventing capture of governance by concentrated private, institutional, or agentic interests."
},
"minority_or_edge_case_protection": {
"type": "string",
"description": "Policy for protecting minority positions, edge cases, and vulnerable affected parties."
},
"public_record_policy": {
"type": "string",
"description": "Policy for what governance records may be made public, redacted, or restricted."
}
},
"default": {}
},
"event_port": {
"type": "object",
"additionalProperties": false,
"required": [
"event_type",
"direction",
"description"
],
"properties": {
"event_type": {
"type": "string",
"description": "Machine-readable event or signal type.",
"pattern": "^[a-z][a-z0-9.*-]*$",
"examples": [
"human.governance.review.requested"
]
},
"direction": {
"type": "string",
"description": "Direction of the event relative to this layer.",
"enum": [
"input",
"output"
]
},
"description": {
"type": "string",
"description": "Short description of the event."
},
"source_layer": {
"type": "string",
"description": "Optional source layer identifier.",
"pattern": "^layer:[a-z0-9][a-z0-9.*:-]*$"
},
"target_layer": {
"type": "string",
"description": "Optional target layer identifier.",
"pattern": "^layer:[a-z0-9][a-z0-9._:-]*$"
},
"schema_ref": {
"type": "string",
"description": "Optional schema reference for this event."
}
}
},
"layer_reference": {
"type": "object",
"additionalProperties": false,
"required": [
"layer_id",
"relationship"
],
"properties": {
"layer_id": {
"type": "string",
"description": "Referenced Earth Brain OS layer identifier.",
"pattern": "^layer:[a-z0-9][a-z0-9._:-]*$"
},
"relationship": {
"type": "string",
"description": "Relationship between this layer and the referenced layer.",
"enum": [
"receives_from",
"sends_to",
"reviews",
"approves",
"vetoes",
"audits",
"governs",
"oversees",
"escalates_to",
"other"
]
},
"description": {
"type": "string"
}
}
},
"trace_requirements": {
"type": "object",
"additionalProperties": false,
"required": [
"trace_required",
"decision_logging_required",
"review_logging_required",
"accountability_logging_required",
"appeal_logging_required"
],
"properties": {
"trace_required": {
"type": "boolean",
"description": "Whether human governance activity must produce trace records."
},
"decision_logging_required": {
"type": "boolean",
"description": "Whether governance decisions must be logged."
},
"review_logging_required": {
"type": "boolean",
"description": "Whether review processes must be logged."
},
"accountability_logging_required": {
"type": "boolean",
"description": "Whether accountability assignments must be logged."
},
"appeal_logging_required": {
"type": "boolean",
"description": "Whether appeals and appeal outcomes must be logged."
},
"provenance_fields": {
"type": "array",
"description": "Required provenance fields for human governance records.",
"items": {
"type": "string"
},
"default": []
},
"retention_policy": {
"type": "string",
"description": "Trace retention policy for this layer."
}
}
},
"governance_hooks": {
"type": "object",
"additionalProperties": false,
"required": [
"human_review_boundary",
"escalation_channels"
],
"properties": {
"human_review_boundary": {
"type": "string",
"description": "Boundary condition that triggers human review."
},
"policy_refs": {
"type": "array",
"description": "Policy documents, rules, or schemas applied to this layer.",
"items": {
"type": "string"
},
"default": []
},
"constitutional_refs": {
"type": "array",
"description": "Constitutional, charter, principle, or foundational governance references.",
"items": {
"type": "string"
},
"default": []
},
"rights_policy_refs": {
"type": "array",
"description": "Human rights, safety, public-interest, consent, or accountability policy references.",
"items": {
"type": "string"
},
"default": []
},
"escalation_channels": {
"type": "array",
"description": "Channels or layers used for escalation.",
"items": {
"type": "string"
},
"default": []
},
"failure_modes": {
"type": "array",
"description": "Known failure modes to monitor.",
"items": {
"type": "string"
},
"default": []
}
}
}
}
}
