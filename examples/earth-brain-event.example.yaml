event_id: "earth-brain-event:v0.2-example-001"
event_type: "earth_brain_event"
event_version: "v0.2.0-candidate"
created_at: "2026-06-13T00:00:00Z"
updated_at: "2026-06-13T00:00:00Z"
status: "experimental"
description: "Example Earth Brain OS event using the v0.2 Modular Event Architecture with eight referenced layers."

architecture:
  architecture_name: "Earth Brain OS Modular Event Architecture"
  architecture_version: "v0.2.0-candidate"
  schema_profile: "modular_event_architecture"
  integration_mode: "ref_based"
  layer_count: 8
  design_principles:
    - "modularity"
    - "traceability"
    - "human_governance"
    - "value_circulation"
    - "defense_resilience"
    - "kazene_regulation"
    - "knowledge_integrity"
    - "agent_coordination"
    - "optical_connectivity"

event_context:
  context_id: "context:earth-brain-v0.2-reference"
  context_type: "reference_model"
  summary: "Reference example for Earth Brain OS v0.2 modular layer integration."
  related_documents:
    - "README.md"
    - "CHANGELOG.md"
  tags:
    - "earth-brain-os"
    - "modular-event-architecture"
    - "v0.2"

layer_order:
  - "ai_agent_layer"
  - "optical_nervous_layer"
  - "knowledge_cortex_layer"
  - "trace_attribution_layer"
  - "royalty_circulation_layer"
  - "kazene_regulation_layer"
  - "defense_immune_layer"
  - "human_governance_layer"

layers:
  ai_agent_layer:
    layer_id: "layer:ai-agent"
    layer_name: "AI Agent Layer"
    layer_type: "ai_agent_layer"
    layer_version: "v0.2.0-candidate"
    status: "experimental"
    description: "AI agents that observe, plan, route, and execute bounded tasks under trace and governance controls."

    agent_scope:
      operating_domains:
        - "reasoning"
        - "planning"
        - "routing"
        - "tool_use"
        - "governance_assistance"
      autonomy_level: "bounded_autonomous"
      execution_boundary: "Agents may recommend and execute bounded operations, but sensitive actions require human review."
      human_supervision: "required_for_sensitive_actions"
      allowed_actions:
        - "classify_event"
        - "route_signal"
        - "request_trace"
        - "prepare_governance_review"
      prohibited_actions:
        - "unreviewed_sensitive_action"
        - "unattributed_external_use"

    agent_roles:
      - role_id: "agent-role:planner"
        role_name: "Planning Agent"
        agent_type: "planner"
        responsibility: "Breaks high-level Earth Brain events into modular layer tasks."
        decision_rights: "recommend"
        model_refs:
          - "model:general-reasoning"
        tool_refs:
          - "tool:schema-validator"
      - role_id: "agent-role:router"
        role_name: "Routing Agent"
        agent_type: "router"
        responsibility: "Routes events between layers according to cross-layer links."
        decision_rights: "execute"
        model_refs:
          - "model:event-router"
        tool_refs:
          - "tool:event-bus"

    capabilities:
      - capability_id: "capability:event-routing"
        capability_name: "Event Routing"
        capability_type: "planning"
        constraints:
          - "Must preserve event provenance."
          - "Must respect governance escalation boundaries."

    coordination_model:
      topology: "multi_agent"
      orchestration_method: "Planner coordinates router and evaluator agents through event-level task records."
      conflict_resolution: "Conflicts are escalated to Human Governance Layer when agent consensus is insufficient."
      escalation_policy: "Escalate to Defense Immune Layer for safety anomalies and Human Governance Layer for rights or accountability issues."

    input_events:
      - event_type: "agent.task.requested"
        direction: "input"
        description: "A task request enters the AI Agent Layer."
        source_layer: "layer:human-governance"
        target_layer: "layer:ai-agent"

    output_events:
      - event_type: "agent.plan.created"
        direction: "output"
        description: "A bounded plan is created for downstream layer processing."
        source_layer: "layer:ai-agent"
        target_layer: "layer:knowledge-cortex"

    linked_layers:
      - layer_id: "layer:knowledge-cortex"
        relationship: "sends_to"
        description: "Agents query the Knowledge Cortex Layer for context."
      - layer_id: "layer:human-governance"
        relationship: "governed_by"
        description: "Sensitive agent actions are reviewed by human governance."

    trace_requirements:
      trace_required: true
      attribution_required: true
      action_logging_required: true
      provenance_fields:
        - "agent_role"
        - "input_event"
        - "output_event"
        - "decision_rights"
      retention_policy: "Retain agent traces for governance and audit review."

    governance_hooks:
      human_review_boundary: "Required when an agent action affects attribution, royalty routing, defense response, or public-interest decisions."
      policy_refs:
        - "docs/human-governance-policy.md"
      guardrail_refs:
        - "docs/agent-boundary-policy.md"
      escalation_channels:
        - "layer:human-governance"
        - "layer:defense-immune"
      failure_modes:
        - "agent_overreach"
        - "untraced_action"
        - "governance_bypass"

  optical_nervous_layer:
    layer_id: "layer:optical-nervous"
    layer_name: "Optical Nervous Layer"
    layer_type: "optical_nervous_layer"
    layer_version: "v0.2.0-candidate"
    status: "experimental"
    description: "High-speed signal transmission layer connecting agents, knowledge, trace, royalty, defense, and governance modules."

    network_scope:
      transport_medium: "hybrid_network"
      operating_domains:
        - "data_transport"
        - "agent_coordination"
        - "memory_sync"
        - "trace_transmission"
        - "governance_signal"
      coverage_scope: "virtual"
      latency_class: "low_latency"
      human_criticality: "governance_relevant"
      boundary_conditions:
        - "Sensitive governance and defense signals require traceable routing."

    optical_nodes:
      - node_id: "optical-node:event-relay-01"
        node_type: "relay_node"
        role: "Routes modular events between Earth Brain OS layers."
        location_scope: "virtual"
        capacity_profile:
          bandwidth_class: "high"
          latency_target: "low-latency event exchange"
          availability_target: "best-effort reference implementation"
        trusted_boundary: "semi_trusted"
      - node_id: "optical-node:trace-gateway-01"
        node_type: "trace_gateway"
        role: "Transmits trace and attribution signals to the Trace Attribution Layer."
        location_scope: "virtual"
        capacity_profile:
          bandwidth_class: "medium"
          latency_target: "event-driven trace transmission"
          availability_target: "audit-ready"
        trusted_boundary: "trusted"

    signal_flows:
      - flow_id: "signal-flow:agent-to-cortex"
        flow_type: "knowledge_query"
        source_node: "optical-node:event-relay-01"
        target_node: "optical-node:trace-gateway-01"
        payload_class: "trace_required"
        priority: "high"
        expected_direction: "bidirectional"
        schema_ref: "schemas/earth-brain-event.schema.json"

    routing_model:
      topology: "hybrid"
      routing_strategy: "Route by layer type, event priority, trace requirement, and governance sensitivity."
      congestion_policy: "Throttle non-critical events and preserve critical governance or defense signals."
      failure_reroute_policy: "Reroute degraded flows to Human Governance Layer or Defense Immune Layer for review."
      routing_constraints:
        - "Do not drop trace-required events."

    latency_profile:
      target_latency: "low latency for operational signals"
      maximum_latency: "best effort in reference model"
      jitter_tolerance: "medium"
      degradation_behavior: "Apply Kazene Regulation Layer throttling when signal pressure rises."

    resilience_controls:
      redundancy_model: "backup_path"
      failure_detection: "Event heartbeat and trace continuity checks."
      fallback_mode: "Switch to manual review flow."
      isolation_policy: "Isolate unstable routing nodes and escalate to Defense Immune Layer."
      monitoring_signals:
        - "signal_delay"
        - "route_failure"
        - "trace_gap"

    input_events:
      - event_type: "optical.signal.requested"
        direction: "input"
        description: "A layer requests signal transmission."
        source_layer: "layer:ai-agent"
        target_layer: "layer:optical-nervous"

    output_events:
      - event_type: "optical.signal.transmitted"
        direction: "output"
        description: "A signal is transmitted to the target layer."
        source_layer: "layer:optical-nervous"
        target_layer: "layer:knowledge-cortex"

    linked_layers:
      - layer_id: "layer:ai-agent"
        relationship: "receives_from"
        description: "Receives agent events for routing."
      - layer_id: "layer:trace-attribution"
        relationship: "synchronizes_with"
        description: "Synchronizes trace-required signal metadata."

    trace_requirements:
      trace_required: true
      signal_logging_required: true
      routing_audit_required: true
      provenance_fields:
        - "source_layer"
        - "target_layer"
        - "event_type"
        - "route_id"
      retention_policy: "Retain routing traces for audit and failure analysis."

    governance_hooks:
      human_review_boundary: "Required when routing failures affect governance, attribution, or defense-critical flows."
      policy_refs:
        - "docs/routing-policy.md"
      security_refs:
        - "docs/defense-routing-controls.md"
      escalation_channels:
        - "layer:defense-immune"
        - "layer:human-governance"
      failure_modes:
        - "lost_signal"
        - "untraced_route"
        - "routing_loop"

  knowledge_cortex_layer:
    layer_id: "layer:knowledge-cortex"
    layer_name: "Knowledge Cortex Layer"
    layer_type: "knowledge_cortex_layer"
    layer_version: "v0.2.0-candidate"
    status: "experimental"
    description: "Knowledge, memory, semantic context, retrieval, and validation layer for Earth Brain OS."

    knowledge_scope:
      knowledge_domains:
        - "scientific"
        - "technical"
        - "governance"
        - "trace_records"
        - "agent_memory"
        - "human_feedback"
      knowledge_mode: "hybrid_cortex"
      authority_level: "governance_relevant"
      update_policy: "Knowledge updates require source metadata, trace links, and validation status."
      human_interpretability: "required"
      boundary_conditions:
        - "Unverified sources must not be treated as authoritative."

    knowledge_sources:
      - source_id: "knowledge-source:earth-brain-reference-docs"
        source_type: "document"
        source_name: "Earth Brain OS Reference Documents"
        source_ref: "docs/"
        trust_level: "medium"
        license_status: "internal"
        update_frequency: "manual"
        attribution_required: true
      - source_id: "knowledge-source:trace-memory"
        source_type: "trace_log"
        source_name: "Trace Memory Records"
        source_ref: "schemas/layers/trace-attribution-layer.schema.json"
        trust_level: "high"
        license_status: "internal"
        update_frequency: "event_driven"
        attribution_required: true

    cortex_nodes:
      - node_id: "cortex-node:governance-memory"
        node_type: "memory_store"
        role: "Stores governance-relevant context and review history."
        knowledge_domain: "governance"
        access_level: "human_review_required"
        linked_source_ids:
          - "knowledge-source:earth-brain-reference-docs"
      - node_id: "cortex-node:trace-context"
        node_type: "trace_memory_node"
        role: "Links knowledge retrieval to trace and attribution context."
        knowledge_domain: "trace_records"
        access_level: "restricted"
        linked_source_ids:
          - "knowledge-source:trace-memory"

    semantic_maps:
      - map_id: "semantic-map:earth-brain-layer-map"
        map_type: "concept_map"
        description: "Maps relationships among the eight Earth Brain OS layers."
        schema_ref: "schemas/earth-brain-event.schema.json"
        linked_nodes:
          - "cortex-node:governance-memory"
          - "cortex-node:trace-context"

    retrieval_model:
      retrieval_method: "hybrid"
      ranking_policy: "Prioritize validated, attributed, and governance-relevant knowledge."
      context_window_policy: "Compress context while preserving source and trace references."
      uncertainty_handling: "Mark uncertain claims and route high-impact ambiguity to human review."
      fallback_strategy: "Use manual review if retrieval confidence is insufficient."

    validation_model:
      validation_method: "hybrid"
      consistency_check_required: true
      source_verification_required: true
      conflict_resolution: "Prefer authoritative sources; escalate unresolved conflicts to Human Governance Layer."
      confidence_threshold: 0.7

    memory_policy:
      memory_type: "hybrid"
      write_policy: "Write only validated or explicitly marked experimental knowledge."
      deletion_policy: "Retire outdated knowledge through versioned records."
      correction_policy: "Corrections must preserve previous trace context."
      retention_policy: "Retain governance-relevant memory as long as needed for audit."

    input_events:
      - event_type: "knowledge.query.requested"
        direction: "input"
        description: "A knowledge query is requested by the AI Agent Layer."
        source_layer: "layer:ai-agent"
        target_layer: "layer:knowledge-cortex"

    output_events:
      - event_type: "knowledge.context.returned"
        direction: "output"
        description: "Validated context is returned with source and trace metadata."
        source_layer: "layer:knowledge-cortex"
        target_layer: "layer:trace-attribution"

    linked_layers:
      - layer_id: "layer:ai-agent"
        relationship: "receives_from"
        description: "Receives queries from AI agents."
      - layer_id: "layer:trace-attribution"
        relationship: "sends_to"
        description: "Sends source and provenance metadata for attribution."

    trace_requirements:
      trace_required: true
      source_attribution_required: true
      retrieval_logging_required: true
      knowledge_update_logging_required: true
      provenance_fields:
        - "knowledge_source"
        - "cortex_node"
        - "retrieval_method"
        - "confidence_score"
      retention_policy: "Retain retrieval and validation traces for audit."

    governance_hooks:
      human_review_boundary: "Required when knowledge is disputed, sensitive, high-impact, or used for governance decisions."
      policy_refs:
        - "docs/knowledge-governance-policy.md"
      license_policy_refs:
        - "docs/source-attribution-policy.md"
      escalation_channels:
        - "layer:trace-attribution"
        - "layer:human-governance"
      failure_modes:
        - "source_conflict"
        - "unverified_claim"
        - "context_loss"

  trace_attribution_layer:
    layer_id: "layer:trace-attribution"
    layer_name: "Trace Attribution Layer"
    layer_type: "trace_attribution_layer"
    layer_version: "v0.2.0-candidate"
    status: "experimental"
    description: "Trace, provenance, origin attribution, permission status, and audit layer."

    attribution_scope:
      trace_domains:
        - "knowledge_use"
        - "agent_action"
        - "model_output"
        - "human_input"
        - "royalty_event"
        - "governance_decision"
      attribution_mode: "hybrid"
      provenance_granularity: "event_level"
      permission_sensitivity: "high"
      human_review_required: true
      boundary_conditions:
        - "Disputed origins must not be routed to royalty settlement without review."

    trace_sources:
      - source_id: "trace-source:knowledge-cortex-log"
        source_type: "knowledge_source"
        source_name: "Knowledge Cortex Retrieval Log"
        source_ref: "layer:knowledge-cortex"
        capture_method: "event_hook"
        trust_level: "high"
        retention_policy: "Retain for attribution and governance audit."
        integrity_check_required: true
      - source_id: "trace-source:agent-action-log"
        source_type: "agent_log"
        source_name: "AI Agent Action Log"
        source_ref: "layer:ai-agent"
        capture_method: "automatic"
        trust_level: "medium"
        retention_policy: "Retain while related governance decisions remain active."
        integrity_check_required: true

    attribution_records:
      - record_id: "attribution-record:origin-001"
        record_type: "source_attribution"
        origin_type: "document"
        origin_ref: "docs/earth-brain-os-reference.md"
        attribution_status: "verified"
        usage_context: "Used as reference context for modular event design."
        confidence_score: 0.9
        linked_trace_ids:
          - "trace:knowledge-query-001"
        royalty_route_ref: "royalty-route:origin-to-public-pool"

    trace_model:
      trace_capture_policy: "Capture trace records for all cross-layer events."
      trace_integrity_policy: "Use append-only trace chains for governance-relevant events."
      trace_linking_method: "event_id"
      retention_policy: "Retain integrated traces for audit, attribution, and dispute resolution."
      immutability_level: "versioned"
      privacy_filtering: "Redact sensitive human data before public reporting."

    attribution_model:
      matching_method: "trace_chain"
      conflict_resolution: "Escalate disputed attribution to Human Governance Layer."
      claim_review_policy: "Claims require trace evidence and human review for high-impact disputes."
      attribution_output_policy: "Attach attribution references to downstream royalty and governance events."
      minimum_confidence_threshold: 0.7

    permission_model:
      permission_tracking_required: true
      permission_status_policy: "Track permission status for attributed sources and update on dispute or expiration."
      restricted_use_handling: "Block or route restricted use to governance review."
      violation_response: "Quarantine violating event and notify Defense Immune Layer."
      permission_status_values:
        - "unknown"
        - "permitted"
        - "restricted"
        - "licensed"
        - "permission_required"
        - "prohibited"
        - "expired"
        - "disputed"

    audit_controls:
      audit_required: true
      audit_frequency: "event_driven"
      audit_method: "Trace chain review with human governance escalation."
      audit_report_ref: "docs/trace-audit-report.md"
      failure_modes:
        - "missing_origin"
        - "permission_mismatch"
        - "trace_tampering"

    input_events:
      - event_type: "trace.record.requested"
        direction: "input"
        description: "A layer requests trace recording."
        source_layer: "layer:knowledge-cortex"
        target_layer: "layer:trace-attribution"

    output_events:
      - event_type: "trace.record.created"
        direction: "output"
        description: "A trace record is created and linked to attribution metadata."
        source_layer: "layer:trace-attribution"
        target_layer: "layer:royalty-circulation"

    linked_layers:
      - layer_id: "layer:knowledge-cortex"
        relationship: "traces"
        description: "Traces knowledge use and retrieval."
      - layer_id: "layer:royalty-circulation"
        relationship: "routes_to"
        description: "Routes attribution records to royalty circulation."

    trace_requirements:
      trace_required: true
      origin_attribution_required: true
      permission_status_required: true
      audit_logging_required: true
      provenance_fields:
        - "origin_ref"
        - "permission_status"
        - "trace_source"
        - "attribution_status"
      retention_policy: "Retain trace-attribution records for audit and dispute resolution."

    governance_hooks:
      human_review_boundary: "Required when attribution is disputed, permission is restricted, or royalty routing depends on unresolved origin claims."
      policy_refs:
        - "docs/trace-attribution-policy.md"
      license_policy_refs:
        - "docs/permission-policy.md"
      royalty_policy_refs:
        - "docs/royalty-routing-policy.md"
      escalation_channels:
        - "layer:human-governance"
        - "layer:defense-immune"
      failure_modes:
        - "attribution_dispute"
        - "permission_violation"
        - "trace_gap"

  royalty_circulation_layer:
    layer_id: "layer:royalty-circulation"
    layer_name: "Royalty Circulation Layer"
    layer_type: "royalty_circulation_layer"
    layer_version: "v0.2.0-candidate"
    status: "experimental"
    description: "Value circulation, royalty routing, allocation, settlement, and public return layer."

    circulation_scope:
      circulation_domains:
        - "knowledge_use"
        - "agent_output"
        - "human_contribution"
        - "public_infrastructure"
        - "governance_contribution"
      circulation_mode: "hybrid"
      value_unit_policy: "Represent value as credits, royalty routes, or public-return records depending on context."
      public_return_policy: "Allocate unresolved or public-interest value to a commons or public pool."
      human_review_required: true
      boundary_conditions:
        - "Do not settle disputed attribution records automatically."

    value_sources:
      - source_id: "value-source:trace-attribution-records"
        source_type: "attribution_record"
        source_name: "Trace Attribution Records"
        source_ref: "layer:trace-attribution"
        measurement_method: "trace_weight"
        trace_ref_required: true
        trust_level: "high"
        update_frequency: "event_driven"
      - source_id: "value-source:human-review-score"
        source_type: "human_review"
        source_name: "Human Review Contribution Score"
        source_ref: "layer:human-governance"
        measurement_method: "human_review_score"
        trace_ref_required: true
        trust_level: "medium"
        update_frequency: "manual"

    beneficiary_records:
      - beneficiary_id: "beneficiary:origin-author-001"
        beneficiary_type: "human_creator"
        beneficiary_ref: "origin:author-001"
        eligibility_status: "eligible"
        return_channel: "recognition_record"
        linked_attribution_records:
          - "attribution-record:origin-001"
        allocation_weight: 0.7
        review_notes: "Eligible based on verified attribution record."
      - beneficiary_id: "beneficiary:public-pool-001"
        beneficiary_type: "public_pool"
        beneficiary_ref: "pool:earth-brain-public-return"
        eligibility_status: "eligible"
        return_channel: "public_fund"
        linked_attribution_records:
          - "attribution-record:origin-001"
        allocation_weight: 0.3
        review_notes: "Public-return share for shared infrastructure."

    allocation_model:
      allocation_method: "public_private_split"
      weighting_policy: "Use trace weight, attribution confidence, and public-interest review."
      dispute_policy: "Pause allocation and escalate to Human Governance Layer during disputes."
      minimum_threshold_policy: "Do not allocate below minimum trace confidence threshold."
      allocation_constraints:
        - "No allocation without attribution link."
        - "No settlement during active dispute."
      example_split:
        - target: "beneficiary:origin-author-001"
          share: 0.7
          description: "Origin return share."
        - target: "beneficiary:public-pool-001"
          share: 0.3
          description: "Public return share."

    royalty_route_model:
      route_strategy: "multi_route"
      route_resolution_method: "Resolve routes from verified attribution records and beneficiary eligibility."
      route_integrity_policy: "Route records must link back to trace and attribution records."
      fallback_route_policy: "Route unresolved value to pending review or public pool."
      route_records:
        - route_id: "royalty-route:origin-to-author"
          route_type: "origin_return"
          source_ref: "attribution-record:origin-001"
          target_ref: "beneficiary:origin-author-001"
          route_status: "active"
          linked_trace_ids:
            - "trace:knowledge-query-001"
        - route_id: "royalty-route:origin-to-public-pool"
          route_type: "public_return"
          source_ref: "attribution-record:origin-001"
          target_ref: "beneficiary:public-pool-001"
          route_status: "active"
          linked_trace_ids:
            - "trace:knowledge-query-001"

    settlement_model:
      settlement_mode: "manual"
      settlement_frequency: "on_demand"
      verification_required: true
      settlement_failure_policy: "Hold settlement and escalate to Human Governance Layer."
      settlement_record_schema_ref: "schemas/layers/royalty-circulation-layer.schema.json"
      currency_or_unit_policy: "Reference model uses non-monetary recognition records by default."

    circulation_controls:
      anti_capture_policy: "Prevent concentrated extraction by requiring trace-linked public or origin return."
      leakage_detection: "Detect use without matching attribution or return route."
      fairness_review_required: true
      rollback_strategy: "Rollback invalid allocation records and preserve audit trace."
      monitoring_signals:
        - "unallocated_value"
        - "disputed_beneficiary"
        - "route_failure"

    input_events:
      - event_type: "royalty.route.requested"
        direction: "input"
        description: "A trace-linked value return route is requested."
        source_layer: "layer:trace-attribution"
        target_layer: "layer:royalty-circulation"

    output_events:
      - event_type: "royalty.route.created"
        direction: "output"
        description: "A royalty or public-return route is created."
        source_layer: "layer:royalty-circulation"
        target_layer: "layer:kazene-regulation"

    linked_layers:
      - layer_id: "layer:trace-attribution"
        relationship: "receives_from"
        description: "Receives attribution records for value circulation."
      - layer_id: "layer:human-governance"
        relationship: "governed_by"
        description: "Governance reviews disputed allocations."

    trace_requirements:
      trace_required: true
      attribution_link_required: true
      allocation_logging_required: true
      settlement_logging_required: true
      provenance_fields:
        - "value_source"
        - "beneficiary_id"
        - "allocation_method"
        - "route_id"
      retention_policy: "Retain circulation records for audit, accountability, and dispute resolution."

    governance_hooks:
